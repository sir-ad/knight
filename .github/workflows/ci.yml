name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: careerflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: careerflow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build extension
        env:
          PLASMO_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.PLASMO_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Package extension
        env:
          PLASMO_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.PLASMO_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run package

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: knight-extension-package
          path: careerflow/build/chrome-mv3-prod.zip
