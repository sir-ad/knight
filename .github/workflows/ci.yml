name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  resume-parser-sidecar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: resume-parser-sidecar

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tesseract
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr

      - name: Install sidecar dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run sidecar tests
        run: pytest tests -q

  extension:
    runs-on: ubuntu-latest
    needs: resume-parser-sidecar
    defaults:
      run:
        working-directory: careerflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: careerflow/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test -- --runInBand

      - name: Build extension
        env:
          PLASMO_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.PLASMO_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Package extension
        env:
          PLASMO_PUBLIC_GOOGLE_CLIENT_ID: ${{ vars.PLASMO_PUBLIC_GOOGLE_CLIENT_ID }}
        run: npm run package

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: knight-extension-package
          path: careerflow/build/chrome-mv3-prod.zip
